<body class="bg-background text-on-background font-body-md overflow-x-hidden">
<main class="flex min-h-screen w-full flex-col md:flex-row">
<!-- Left Section: Visual Anchor -->
<section class="relative w-full md:w-1/2 h-64 md:h-screen overflow-hidden">
<div class="absolute inset-0 bg-black/50 z-10"></div>
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="A grand, high-ceilinged luxury expo hall with warm atmospheric lighting. Sophisticated booths with sharp minimalist lines and gold accents are occupied by elegantly dressed attendees. The scene is shot with a shallow depth of field, highlighting the prestige and professional energy of a high-end corporate event. The palette features deep blacks, crisp whites, and vibrant primary pink highlights." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDCgGG1FkBskwds101bOyFar696TrQ5XOBPwP1HbFj8aJacjUp3mVSvUsikgMHJkX77esnCHkF1YpE4Iv_Ekcrx7fFZARwEeYlS6nHIpHb7Zs-8YYMVhiKWYmLanSy50j1IdQCgHPEtsV3XfXkEPXtRKuVn1AAyUo35ZmAF_Arhfz2URzvfEaeskj_LOdvsOyqvdyGTHjCj_vQTdEFznn6pszfRstpZ0qpQw5OQ1Pin_NiZRLPbwVFWwQ3EV8uNJES4h1DbTkEbo5U')">
</div>
<div class="relative z-20 h-full flex flex-col justify-between p-margin-mobile md:p-margin-desktop text-white">
<div>
<h1 class="font-headline-h3 text-headline-h3 text-primary tracking-tight">EventSphere</h1>
</div>
<div class="max-w-md">
<p class="font-headline-h1 text-headline-h1 leading-tight">Where extraordinary events begin</p>
</div>
</div>
</section>
<!-- Right Section: Form Canvas -->
<section class="w-full md:w-1/2 bg-white flex items-center justify-center p-margin-mobile md:p-margin-desktop min-h-screen">
<div class="w-full max-w-md">
<!-- Login View -->
<div class="form-transition" id="login-view">
<header class="mb-10">
<h2 class="font-headline-h2 text-headline-h2 text-on-surface mb-2">WELCOME BACK</h2>
<p class="font-body-md text-on-surface-variant">Sign in to manage your events</p>
</header>
<form class="space-y-6" onsubmit="return false">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block">EMAIL ADDRESS</label>
<input class="w-full border border-outline-variant bg-surface px-4 py-3 font-body-md zero-radius focus:border-primary transition-colors" placeholder="name@company.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block">PASSWORD</label>
<a class="font-label-caps text-label-caps text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full border border-outline-variant bg-surface px-4 py-3 font-body-md zero-radius focus:border-primary transition-colors" id="login-password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" onclick="togglePassword('login-password')" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-button text-button py-4 hover:bg-primary-container transition-all active:scale-[0.98] zero-radius" type="button">
                            SIGN IN
                        </button>
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="mx-4 font-label-caps text-label-caps text-tertiary">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="text-center">
<p class="font-body-sm text-on-surface-variant">
                                Don't have an account? 
                                <button class="text-primary font-semibold hover:underline" onclick="switchView('register-view')" type="button">Register now</button>
</p>
</div>
</form>
</div>
<!-- Register View -->
<div class="form-transition hidden-form" id="register-view">
<header class="mb-8">
<h2 class="font-headline-h2 text-headline-h2 text-on-surface mb-2">CREATE ACCOUNT</h2>
<p class="font-body-md text-on-surface-variant">Join the prestige operationalized network</p>
</header>
<div class="mb-8">
<label class="font-label-caps text-label-caps text-on-surface-variant block mb-4">SELECT YOUR ROLE</label>
<div class="grid grid-cols-3 gap-3">
<button class="role-card border-2 border-outline-variant p-3 text-center transition-all group zero-radius" onclick="selectRole(this)">
<span class="material-symbols-outlined block mb-1 text-on-surface-variant group-[.active]:text-primary">calendar_today</span>
<span class="font-label-caps text-[10px] text-on-surface-variant group-[.active]:text-primary">ORGANIZER</span>
</button>
<button class="role-card border-2 border-outline-variant p-3 text-center transition-all group zero-radius" onclick="selectRole(this)">
<span class="material-symbols-outlined block mb-1 text-on-surface-variant group-[.active]:text-primary">storefront</span>
<span class="font-label-caps text-[10px] text-on-surface-variant group-[.active]:text-primary">EXHIBITOR</span>
</button>
<button class="role-card border-2 border-outline-variant p-3 text-center transition-all group zero-radius active" onclick="selectRole(this)">
<span class="material-symbols-outlined block mb-1 text-on-surface-variant group-[.active]:text-primary">person</span>
<span class="font-label-caps text-[10px] text-on-surface-variant group-[.active]:text-primary">ATTENDEE</span>
</button>
</div>
</div>
<form class="space-y-4" onsubmit="return false">
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block">FULL NAME</label>
<input class="w-full border border-outline-variant bg-surface px-4 py-3 font-body-md zero-radius focus:border-primary transition-colors" placeholder="John Doe" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block">EMAIL</label>
<input class="w-full border border-outline-variant bg-surface px-4 py-3 font-body-md zero-radius focus:border-primary transition-colors" placeholder="email@domain.com" type="email"/>
</div>
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block">PHONE</label>
<input class="w-full border border-outline-variant bg-surface px-4 py-3 font-body-md zero-radius focus:border-primary transition-colors" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block">PASSWORD</label>
<div class="relative">
<input class="w-full border border-outline-variant bg-surface px-4 py-3 font-body-md zero-radius focus:border-primary transition-colors" id="reg-password" placeholder="Minimum 8 characters" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" onclick="togglePassword('reg-password')" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-button text-button py-4 hover:bg-primary-container transition-all active:scale-[0.98] mt-4 zero-radius" type="button">
                            CREATE ACCOUNT
                        </button>
<div class="text-center pt-4">
<p class="font-body-sm text-on-surface-variant">
                                Already have an account? 
                                <button class="text-primary font-semibold hover:underline" onclick="switchView('login-view')" type="button">Sign in</button>
</p>
</div>
</form>
</div>
</div>
</section>
</main>
<script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function switchView(viewId) {
            const login = document.getElementById('login-view');
            const register = document.getElementById('register-view');

            if (viewId === 'register-view') {
                login.classList.add('hidden-form');
                setTimeout(() => {
                    login.style.display = 'none';
                    register.style.display = 'block';
                    setTimeout(() => {
                        register.classList.remove('hidden-form');
                    }, 50);
                }, 300);
            } else {
                register.classList.add('hidden-form');
                setTimeout(() => {
                    register.style.display = 'none';
                    login.style.display = 'block';
                    setTimeout(() => {
                        login.classList.remove('hidden-form');
                    }, 50);
                }, 300);
            }
        }

        function selectRole(element) {
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('active', 'border-primary', 'bg-primary-container/10');
                card.classList.add('border-outline-variant');
            });
            element.classList.add('active', 'border-primary', 'bg-primary-container/10');
            element.classList.remove('border-outline-variant');
        }

        // Initialize active state for attendee by default
        document.addEventListener('DOMContentLoaded', () => {
            const defaultRole = document.querySelectorAll('.role-card')[2];
            selectRole(defaultRole);
        });
    </script>
</body></html>
